name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip Docker Hub push and git tag (build + login only)'
        type: boolean
        default: true

permissions:
  contents: write  # needed to push the version tag back to origin

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version was bumped
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG already exists on origin. Bump 'version' in package.json before merging staging into main."
            exit 1
          fi
          echo "Tag $TAG is new — proceeding with release."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.dry_run != true }}
          tags: |
            sundaebarai/sn121-validator:${{ steps.version.outputs.tag }}
            sundaebarai/sn121-validator:latest

      # Tag last: if Docker Hub push fails, we don't want a stranded git tag.
      - name: Create and push git tag
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
