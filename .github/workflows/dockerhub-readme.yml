name: Sync Docker Hub description

# The image push in release.yml uploads only the image — Docker Hub's repo
# "Overview" is a separate field that a `docker push` never touches. This
# workflow mirrors README.md into the sundaebarai/sn121-validator overview
# whenever README.md changes on main, plus a manual trigger to seed it.
on:
  push:
    branches: [main]
    paths: [README.md]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub repository description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # Reuses the same secret as the image push (release.yml). The token
          # must have write access to the repository. If Docker Hub rejects the
          # update with 401, create a PAT with "Read & Write" scope (or add a
          # DOCKERHUB_PASSWORD secret holding the account password) and use it
          # here instead.
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: sundaebarai/sn121-validator
          short-description: Validator client for Sundae Bar subnet 121 (SN121) on Bittensor
          readme-filepath: ./README.md
