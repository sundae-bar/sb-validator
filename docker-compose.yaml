services:
  letta-db:
    image: ankane/pgvector:v0.5.1
    container_name: sn121-letta-db
    environment:
      - POSTGRES_USER=${LETTA_PG_USER:-letta}
      - POSTGRES_PASSWORD=${LETTA_PG_PASSWORD:-letta}
      - POSTGRES_DB=${LETTA_PG_DB:-letta}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LETTA_PG_USER:-letta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  letta-server:
    image: sundaebarai/letta:latest
    container_name: sn121-letta
    depends_on:
      letta-db:
        condition: service_healthy
    ports:
      - "8283:8283"
    environment:
      - LETTA_PG_DB=${LETTA_PG_DB:-letta}
      - LETTA_PG_USER=${LETTA_PG_USER:-letta}
      - LETTA_PG_PASSWORD=${LETTA_PG_PASSWORD:-letta}
      - LETTA_PG_HOST=letta-db
      - LETTA_PG_PORT=5432
      - LETTA_PG_URI=postgresql://${LETTA_PG_USER:-letta}:${LETTA_PG_PASSWORD:-letta}@letta-db:5432/${LETTA_PG_DB:-letta}
      - LETTA_SERVER_PASS=${LETTA_SERVER_PASS}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - .env
    volumes:
      - letta-data:/root/.letta
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8283/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sbevals:
    image: sundaebarai/sn121-skill-evals:latest
    container_name: sn121-sbevals
    ports:
      - "8090:8090"
    environment:
      - NODE_ENV=production
      - SERVER_PORT=8090
      - EVAL_SERVICE_API_KEY=${SBEVALS_API_KEY}
      # Provider keys — each challenge's suite.yaml selects the provider, so forward
      # them all; unset ones stay empty. Chutes/OpenRouter cover most skill challenges.
      - CHUTES_API_KEY=${CHUTES_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - TOGETHERAI_API_KEY=${TOGETHERAI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Optional global override for the skill-specific judge graders
      # (evaluate_skill_use, evaluate_scenario_quality, dataset_derived_knowledge,
      # skill_rubric_alignment), which otherwise default to openai/gpt-5.1. Leave
      # unset to keep that default, or point them at e.g. openrouter/chutes.
      - SKILL_USE_JUDGE_PROVIDER=${SKILL_USE_JUDGE_PROVIDER:-}
      - SKILL_USE_JUDGE_MODEL=${SKILL_USE_JUDGE_MODEL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  validator:
    image: sundaebarai/sn121-validator:latest
    container_name: sn121-validator
    depends_on:
      letta-server:
        condition: service_healthy
      sbevals:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - LETTA_BASE_URL=http://letta-server:8283
      - SBEVALS_URL=http://sbevals:8090
    env_file:
      - .env
    volumes:
      - ${HOME}/.bittensor/wallets:/home/validator/.bittensor/wallets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  watchtower:
    image: containrrr/watchtower:latest
    container_name: sn121-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_DEBUG=true
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped
    command:
      - sn121-validator
      - sn121-letta
      - sn121-sbevals

volumes:
  letta-data:
  postgres-data: